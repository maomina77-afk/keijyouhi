<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>支払い確認アプリ</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: sans-serif;
    font-size: 32px;
    padding: 12px;
    margin: 0;
    background: #f5f5f5;
  }
  input, select, button {
    font-size: 32px;
    padding: 18px;
    width: 100%;
    margin-top: 12px;
  }
  button {
    background: #007bff;
    color: #fff;
    border: none;
    border-radius: 12px;
  }
  button:active { background: #0056b3; }
  
  #topInfo {
    position: sticky; top: 0; background: #ffffff;
    padding: 10px; border-bottom: 3px solid #ccc; z-index: 20;
  }
  #searchArea {
    background: #ffffff; padding: 10px; border-bottom: 1px solid #ddd;
  }
  #candidateList {
    border: 3px solid #ccc; border-radius: 12px;
    max-height: 360px; overflow-y: auto; margin-top: 10px; background: #fff;
  }
  .list-item { padding: 18px; border-bottom: 1px solid #eee; }
  .paid { background: #e0ffe0; }

  /* スキャナー表示エリア */
  #reader {
    width: 100%;
    max-width: 500px;
    margin: 16px auto;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
  }
  #scanResult { font-size: 28px; font-weight: bold; color: #d9534f; margin-top: 8px; }

  /* カスタムダイアログ */
  #dialogOverlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  #dialogBox { width: 85%; padding: 24px; border-radius: 16px; color: #fff; text-align: center; }
  #dialogButtons button { width: 45%; margin: 0 2%; background: #eee; color: #333; }
</style>
</head>

<body>

<div id="topInfo">
  合計金額: <span id="totalAmount">0</span> 円　
  最終更新: <span id="lastUpdate">-</span>
</div>

<div id="searchArea">
  <div>名簿ファイル（.xlsx）を選択：</div>
  <input type="file" id="file" accept=".xlsx">
  <div id="loadStatus" style="font-size:26px; margin-top:4px;"></div>

  <h3>検索・絞り込み</h3>
  <input type="text" id="kanaSearch" placeholder="ふりがなで検索">
  <select id="groupSearch"><option value="">組を指定しない</option></select>
  <input type="text" id="idSearch" placeholder="IDで検索">
  <select id="statusFilter">
    <option value="all">全員</option>
    <option value="unpaid">未払者のみ</option>
    <option value="paid">既払者のみ</option>
  </select>
  <button id="filterButton">リストを更新</button>

  <div id="candidateList"></div>
</div>

<h3>バーコードスキャン (CODE39)</h3>
<button id="startScanButton">カメラを起動する</button>
<div id="reader"></div>
<p id="scanResult"></p>

<div style="margin-top:40px; padding: 10px; border-top: 2px solid #ccc;">
  <button onclick="exportLog()">支払いログを出力 (Excel)</button>
  <button onclick="exportRoster()" style="background:#28a745;">更新後の名簿を出力 (Excel)</button>
</div>

<!-- カスタムダイアログ -->
<div id="dialogOverlay">
  <div id="dialogBox">
    <div id="dialogMessage" style="font-size: 36px; margin-bottom: 30px;"></div>
    <div id="dialogButtons">
      <button id="dialogCancel">いいえ</button>
      <button id="dialogOk" style="font-weight:bold;">はい</button>
    </div>
  </div>
</div>

<script>
let roster = [];
let logs = [];
let totalAmount = 0;
let html5QrCode = null;

const STORAGE_KEY_ROSTER = "shiharai_roster";
const STORAGE_KEY_LOGS = "shiharai_logs";
const STORAGE_KEY_TOTAL = "shiharai_total";

// --- ダイアログ制御 ---
let dialogResolve = null;
function showDialog(message, color) {
  return new Promise((resolve) => {
    dialogResolve = resolve;
    const overlay = document.getElementById("dialogOverlay");
    document.getElementById("dialogBox").style.background = color;
    document.getElementById("dialogMessage").textContent = message;
    overlay.style.display = "flex";
  });
}
document.getElementById("dialogCancel").onclick = () => {
  document.getElementById("dialogOverlay").style.display = "none";
  if (dialogResolve) dialogResolve(false);
};
document.getElementById("dialogOk").onclick = () => {
  document.getElementById("dialogOverlay").style.display = "none";
  if (dialogResolve) dialogResolve(true);
};

// --- カメラ制御 (html5-qrcode) ---
document.getElementById("startScanButton").addEventListener("click", async () => {
  if (html5QrCode) {
    await html5QrCode.stop();
    html5QrCode = null;
    document.getElementById("startScanButton").innerText = "カメラを起動する";
    return;
  }

  html5QrCode = new Html5Qrcode("reader");
  const config = {
    fps: 10,
    qrbox: { width: 300, height: 150 }, // バーコード用に横長
    formatsToSupport: [ Html5QrcodeSupportedFormats.CODE_39 ]
  };

  html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
  .then(() => {
    document.getElementById("startScanButton").innerText = "カメラを停止する";
  })
  .catch(err => {
    alert("カメラ起動エラー: " + err);
    html5QrCode = null;
  });
});

async function onScanSuccess(decodedText) {
  // 連続読み取りを防ぐため一旦停止
  if (html5QrCode) {
    await html5QrCode.stop();
    html5QrCode = null;
    document.getElementById("startScanButton").innerText = "カメラを起動する";
  }

  document.getElementById("scanResult").innerText = "読取結果: " + decodedText;
  const person = roster.find(r => (r["ID"] || "").toString() === decodedText);

  if (person) {
    const ok = await showDialog(person["氏名"] + " さんを支払済にしますか？", "#5cb85c");
    if (ok) markPaid(person, "barcode");
  } else {
    alert("名簿に存在しないIDです: " + decodedText);
  }
}

// --- データ処理系 ---
function markPaid(person, method) {
  if (person["支払状況"] === "済") return;
  person["支払状況"] = "済";
  const now = new Date().toLocaleString();
  person["支払日時"] = now;
  logs.push({ ID: person["ID"], 氏名: person["氏名"], 金額: person["金額"], 方法: method, 時刻: now });
  totalAmount += Number(person["金額"] || 0);
  updateUI();
  saveState();
}

function updateUI() {
  document.getElementById("totalAmount").textContent = totalAmount.toLocaleString();
  document.getElementById("lastUpdate").textContent = logs.length ? logs[logs.length - 1].時刻 : "-";
  filterList();
}

function filterList() {
  const kana = document.getElementById("kanaSearch").value.trim();
  const group = document.getElementById("groupSearch").value;
  const id = document.getElementById("idSearch").value.trim();
  const status = document.getElementById("statusFilter").value;
  const listDiv = document.getElementById("candidateList");
  listDiv.innerHTML = "";

  let filtered = roster.filter(r => {
    let match = true;
    if (kana && !(r["ふりがな"] || "").toString().includes(kana)) match = false;
    if (group && r["組"] != group) match = false;
    if (id && !(r["ID"] || "").toString().includes(id)) match = false;
    if (status === "unpaid" && r["支払状況"] === "済") match = false;
    if (status === "paid" && r["支払状況"] !== "済") match = false;
    return match;
  });

  filtered.forEach(r => {
    const div = document.createElement("div");
    div.className = "list-item" + (r["支払状況"] === "済" ? " paid" : "");
    div.textContent = `${r["氏名"]} (${r["組"]}) / ${r["金額"]}円 [${r["支払状況"] || "未"}]`;
    div.onclick = async () => {
      if (r["支払状況"] !== "済") {
        const ok = await showDialog(r["氏名"] + " さんを支払済にしますか？", "#5cb85c");
        if (ok) markPaid(r, "manual");
      }
    };
    listDiv.appendChild(div);
  });
}

// --- ファイル関連 ---
document.getElementById("file").onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const data = await file.arrayBuffer();
  const workbook = XLSX.read(data);
  roster = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
  
  // 組セレクトボックス更新
  const groups = [...new Set(roster.map(r => r["組"]))];
  const select = document.getElementById("groupSearch");
  select.innerHTML = '<option value="">全組表示</option>';
  groups.forEach(g => {
    const opt = document.createElement("option");
    opt.value = g; opt.textContent = g;
    select.appendChild(opt);
  });

  document.getElementById("loadStatus").innerText = roster.length + " 名読み込み完了";
  updateUI();
};

function saveState() {
  localStorage.setItem(STORAGE_KEY_ROSTER, JSON.stringify(roster));
  localStorage.setItem(STORAGE_KEY_LOGS, JSON.stringify(logs));
  localStorage.setItem(STORAGE_KEY_TOTAL, totalAmount);
}

window.onload = () => {
  const savedRoster = localStorage.getItem(STORAGE_KEY_ROSTER);
  if (savedRoster) {
    roster = JSON.parse(savedRoster);
    logs = JSON.parse(localStorage.getItem(STORAGE_KEY_LOGS) || "[]");
    totalAmount = Number(localStorage.getItem(STORAGE_KEY_TOTAL) || 0);
    updateUI();
  }
};

function exportLog() {
  const ws = XLSX.utils.json_to_sheet(logs);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Log");
  XLSX.writeFile(wb, "支払いログ.xlsx");
}

function exportRoster() {
  const ws = XLSX.utils.json_to_sheet(roster);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Master");
  XLSX.writeFile(wb, "更新名簿.xlsx");
}
</script>
</body>
</html>
