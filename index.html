<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カメラズーム対応テスト</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 16px; }
    video { width: 100%; max-width: 480px; background: #000; }
    .hidden { display: none; }
    .log { white-space: pre-wrap; font-size: 12px; background:#f5f5f5; padding:8px; border-radius:4px; }
  </style>
</head>
<body>
  <h1>カメラズーム対応テスト</h1>
  <p>このページで <code>track.applyConstraints({ advanced: [{ zoom: ... }] })</code> が使えるか確認します。</p>

  <button id="startBtn">カメラ起動</button>
  <p id="status">未開始</p>

  <video id="video" autoplay playsinline></video>

  <div id="zoomContainer" class="hidden">
    <label for="zoomRange">ズーム: <span id="zoomValue">1.0</span>x</label><br>
    <input id="zoomRange" type="range" min="1" max="5" step="0.1">
  </div>

  <h2>結果 / ログ</h2>
  <div id="log" class="log"></div>

  <script>
    const startBtn = document.getElementById('startBtn');
    const statusEl = document.getElementById('status');
    const video = document.getElementById('video');
    const logEl = document.getElementById('log');
    const zoomContainer = document.getElementById('zoomContainer');
    const zoomRange = document.getElementById('zoomRange');
    const zoomValue = document.getElementById('zoomValue');

    let track = null;
    let capabilities = null;

    function log(msg) {
      console.log(msg);
      logEl.textContent += msg + "\n";
    }

    async function startCamera() {
      try {
        statusEl.textContent = 'カメラ起動中…';
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        video.srcObject = stream;

        track = stream.getVideoTracks()[0];
        log('取得したトラック: ' + track.label);

        if (!track.getCapabilities) {
          statusEl.textContent = 'このブラウザは getCapabilities() 非対応です。';
          log('getCapabilities() がありません。zoom 対応は判定できません。');
          return;
        }

        capabilities = track.getCapabilities();
        log('capabilities: ' + JSON.stringify(capabilities, null, 2));

        if (!('zoom' in capabilities)) {
          statusEl.textContent = 'zoom capability がありません（この端末ではズーム不可の可能性が高い）。';
          log('capabilities.zoom が存在しません。');
          return;
        }

        const { min, max } = capabilities.zoom;
        statusEl.textContent = `zoom 対応あり: min=${min}, max=${max}`;
        log(`zoom capability: min=${min}, max=${max}`);

        // スライダーを capability に合わせる
        zoomRange.min = min;
        zoomRange.max = max;
        zoomRange.step = 0.1;
        zoomRange.value = min;
        zoomValue.textContent = min.toFixed(1);
        zoomContainer.classList.remove('hidden');

      } catch (err) {
        console.error(err);
        statusEl.textContent = 'カメラ起動に失敗しました。';
        log('エラー: ' + err.name + ' - ' + err.message);
      }
    }

    async function applyZoom(value) {
      if (!track || !capabilities || !('zoom' in capabilities)) {
        log('zoom 未対応のため applyConstraints はスキップしました。');
        return;
      }
      try {
        await track.applyConstraints({
          advanced: [{ zoom: value }]
        });
        log(`applyConstraints 成功: zoom=${value}`);
      } catch (err) {
        log('applyConstraints エラー: ' + err.name + ' - ' + err.message);
      }
    }

    startBtn.addEventListener('click', () => {
      startCamera();
    });

    zoomRange.addEventListener('input', (e) => {
      const v = Number(e.target.value);
      zoomValue.textContent = v.toFixed(1);
      applyZoom(v);
    });
  </script>
</body>
</html>
