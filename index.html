<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>支払い管理システム 7.0 (最適化版)</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
  body { font-family: sans-serif; font-size: 48px; padding: 20px; margin: 0; background: #f0f0f0; }
  h3 { font-size: 50px; margin: 15px 0; border-left: 10px solid #007bff; padding-left: 20px; }
  input, select, button { font-size: 48px; padding: 25px; width: 100%; margin-top: 15px; border-radius: 15px; border: 2px solid #ccc; }
  
  /* 上部ヘッダー */
  #topInfo { 
    background: #333; color: white; padding: 20px; border-radius: 20px; 
    display: flex; justify-content: space-between; align-items: center; font-weight: bold;
  }

  .row-group { display: flex; gap: 15px; margin-top: 15px; }
  .row-group > * { flex: 1; margin-top: 0; }

  button { background: #007bff; color: white; border: none; cursor: pointer; }
  .btn-stop { background: #dc3545; }
  .btn-reset { background: #6c757d; font-size: 32px; }
  .btn-excel { background: #28a745; }

  /* スキャナーエリア */
  #reader { width: 70%; max-width: 400px; margin: 20px auto; background: #000; border-radius: 20px; overflow: hidden; min-height: 200px; }
  
  /* リスト：上下を限界まで詰める */
  #candidateList { border: 4px solid #333; border-radius: 20px; max-height: 800px; overflow-y: auto; background: #fff; margin-top: 15px; }
  .list-item { 
    padding: 10px 25px; /* 上下をさらに圧縮 */
    border-bottom: 2px solid #eee; 
    display: flex; justify-content: space-between; align-items: center; gap: 20px;
  }
  .item-name { font-size: 60px; font-weight: bold; flex: 1; word-break: break-all; line-height: 1.1; }
  .paid { background: #d4edda; }
  
  /* ダイアログ：動的に背景色を変更 */
  #dialogOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; }
  #dialogBox { width: 90%; padding: 40px; border-radius: 30px; text-align: center; border: 5px solid #333; }

  /* 最下部エリア */
  #dangerZone { margin-top: 100px; padding: 40px; border-top: 5px dashed #ccc; }
</style>
</head>

<body>

<div id="topInfo">
  <div>合計: <span id="totalAmount">0</span>円</div>
  <div id="clock" style="font-size: 60px;">00:00:00</div>
</div>

<div id="searchArea">
  <h3>名簿検索</h3>
  <input type="text" id="kanaSearch" placeholder="名前・ふりがな検索" oninput="updateList()">
  <div class="row-group">
    <select id="groupSearch" onchange="updateList()"><option value="">全組</option></select>
    <select id="statusSearch" onchange="updateList()">
      <option value="all">全員</option>
      <option value="unpaid">未納</option>
      <option value="paid">支払い済</option>
    </select>
  </div>
  <div id="candidateList"></div>
</div>

<h3>スキャン</h3>
<div class="row-group">
  <button id="startBtn" onclick="startScanner()">カメラ起動</button>
  <button class="btn-stop" id="stopBtn" onclick="stopScanner()">停止</button>
</div>
<div id="reader"></div>

<div class="row-group" style="margin-top: 40px;">
  <button class="btn-excel" onclick="exportLogs()">ログ出力</button>
  <button class="btn-excel" onclick="exportRoster()">名簿出力</button>
</div>

<!-- ダイアログ -->
<div id="dialogOverlay">
  <div id="dialogBox">
    <div id="dialogMessage" style="font-size: 55px; margin-bottom: 40px; white-space: pre-wrap; font-weight: bold;"></div>
    <div class="row-group">
      <button onclick="dialogClick(false)" style="background:#666; color:white;">いいえ</button>
      <button onclick="dialogClick(true)" id="dialogConfirmBtn">はい</button>
    </div>
  </div>
</div>

<!-- ファイル選択とリセットを最下部へ -->
<div id="dangerZone">
  <p style="font-size: 24px; color: #666;">※設定・データ管理</p>
  <input type="file" id="file" accept=".xlsx">
  <button class="btn-reset" onclick="confirmReset()" style="margin-top: 30px;">全データ消去リセット</button>
</div>

<script>
let roster = [];
let html5QrCode = null;
let dialogResolver = null;

// 時計の更新
function updateClock() {
  const now = new Date();
  document.getElementById('clock').innerText = now.toLocaleTimeString();
}
setInterval(updateClock, 1000);

window.onload = () => {
  const saved = localStorage.getItem('paymentRoster');
  if (saved) {
    roster = JSON.parse(saved);
    rebuildGroupOptions();
    updateList();
  }
  // ページ更新時にスキャナを自動起動
  if (localStorage.getItem('scannerActive') === 'true') {
    startScanner();
  }
};

document.getElementById('file').addEventListener('change', (e) => {
  const reader = new FileReader();
  reader.onload = (e) => {
    const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
    roster = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
    rebuildGroupOptions();
    saveAndRefresh();
    alert("名簿を読み込みました");
  };
  reader.readAsArrayBuffer(e.target.files[0]);
});

function rebuildGroupOptions() {
  const groupSelect = document.getElementById('groupSearch');
  const groups = [...new Set(roster.map(r => r["組"]).filter(Boolean))];
  groupSelect.innerHTML = '<option value="">全組</option>';
  groups.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g; opt.textContent = g + "組";
    groupSelect.appendChild(opt);
  });
}

function saveAndRefresh() {
  localStorage.setItem('paymentRoster', JSON.stringify(roster));
  updateList();
}

function updateList() {
  const search = document.getElementById('kanaSearch').value;
  const groupFilter = document.getElementById('groupSearch').value;
  const statusFilter = document.getElementById('statusSearch').value;
  const container = document.getElementById('candidateList');
  container.innerHTML = "";
  let total = 0;

  roster.forEach(p => {
    const isPaid = p["支払いステータス"] === "完了";
    if (isPaid) total += Number(p["金額"] || 0);

    const matchSearch = !search || (p["氏名"]+(p["ふりがな"]||"")).includes(search);
    const matchGroup = !groupFilter || String(p["組"]) === groupFilter;
    const matchStatus = statusFilter === "all" || (statusFilter === "paid" ? isPaid : !isPaid);

    if (matchSearch && matchGroup && matchStatus) {
      const div = document.createElement('div');
      div.className = 'list-item' + (isPaid ? " paid" : "");
      div.innerHTML = `
        <div class="item-name">${p["組"] ? p["組"]+'組 ' : ''}${p["氏名"]}</div>
        <button onclick="confirmPay('${p["ID"]}', 'manual')" style="width:auto; padding:20px 40px; min-width: 180px; font-size: 40px;">${isPaid ? '取消' : '支払'}</button>
      `;
      container.appendChild(div);
    }
  });
  document.getElementById('totalAmount').innerText = total.toLocaleString();
}

function showDialog(msg, isCancelMode = false) {
  const box = document.getElementById('dialogBox');
  const btn = document.getElementById('dialogConfirmBtn');
  
  if (isCancelMode) {
    box.style.backgroundColor = "#fff0f0"; // 薄い赤
    btn.style.backgroundColor = "#dc3545";
  } else {
    box.style.backgroundColor = "#f0fff4"; // 薄い緑
    btn.style.backgroundColor = "#28a745";
  }

  document.getElementById('dialogMessage').innerText = msg;
  document.getElementById('dialogOverlay').style.display = 'flex';
  return new Promise(res => { dialogResolver = res; });
}

function dialogClick(val) {
  document.getElementById('dialogOverlay').style.display = 'none';
  dialogResolver(val);
}

async function confirmPay(id, type) {
  const p = roster.find(r => String(r["ID"]) === String(id));
  const isCurrentlyPaid = p["支払いステータス"] === "完了";
  const actionText = isCurrentlyPaid ? "取り消し" : "支払い";
  
  if (await showDialog(`${p["氏名"]}さん\n${actionText}を確定しますか？`, isCurrentlyPaid)) {
    if (!isCurrentlyPaid) {
      p["支払いステータス"] = "完了";
      p["入力区分"] = type === "manual" ? "手動入力" : "バーコード入力";
      const now = new Date();
      p["日付"] = now.toLocaleDateString();
      p["時刻"] = now.toTimeString().split(' ')[0];
    } else {
      p["支払いステータス"] = "";
      delete p["入力区分"]; delete p["日付"]; delete p["時刻"];
    }
    saveAndRefresh();
  }
}

async function confirmReset() {
  if (await showDialog("全てのデータを消去して初期化しますか？\n(この操作は戻せません)", true)) {
    localStorage.clear(); roster = []; location.reload();
  }
}

async function startScanner() {
  localStorage.setItem('scannerActive', 'true');
  if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
  const config = { fps: 15, qrbox: { width: 225, height: 125 } };
  try {
    await html5QrCode.start({ facingMode: "environment" }, config, async (txt) => { await onScanSuccess(txt); });
  } catch (err) { console.error(err); }
}

async function stopScanner() {
  localStorage.setItem('scannerActive', 'false');
  if (html5QrCode) { try { await html5QrCode.stop(); } catch(e) {} }
}

async function onScanSuccess(code) {
  const p = roster.find(r => String(r["ID"]) === String(code));
  if (p) {
    await stopScanner();
    await confirmPay(p["ID"], "barcode");
    startScanner(); 
  } else {
    await stopScanner();
    await showDialog(`未登録ID: ${code}`, true);
    startScanner();
  }
}

function exportRoster() {
  const ws = XLSX.utils.json_to_sheet(roster);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "全名簿");
  XLSX.writeFile(wb, "roster_export.xlsx");
}
function exportLogs() {
  const logs = roster.filter(r => r["支払いステータス"] === "完了");
  const ws = XLSX.utils.json_to_sheet(logs);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "支払いログ");
  XLSX.writeFile(wb, "payment_logs.xlsx");
}
</script>
</body>
</html>
