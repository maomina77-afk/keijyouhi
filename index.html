<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>支払い管理システム 7.0 (同時表示版)</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
  /* 全体デザイン：省スペース化 */
  body { font-family: sans-serif; font-size: 32px; padding: 10px; margin: 0; background: #f0f0f0; }
  h3 { font-size: 36px; margin: 10px 0; border-left: 8px solid #007bff; padding-left: 15px; }
  input, select, button { font-size: 32px; padding: 15px; width: 100%; margin-top: 8px; border-radius: 10px; border: 2px solid #ccc; }
  
  .row-group { display: flex; gap: 10px; margin-top: 8px; }
  .row-group > * { flex: 1; margin-top: 0; }

  button { background: #007bff; color: white; cursor: pointer; border: none; }
  .btn-stop { background: #dc3545; }
  .btn-excel { background: #28a745; height: 80px; }

  /* スキャナー固定エリア：高さを最小限に */
  #scannerContainer { position: sticky; top: 0; background: #f0f0f0; z-index: 50; padding-bottom: 10px; }
  #reader { width: 100%; max-width: 500px; margin: 0 auto; background: #000; border-radius: 15px; overflow: hidden; height: 180px; }
  
  /* リスト表示：1行に圧縮 */
  #candidateList { border: 3px solid #333; border-radius: 15px; background: #fff; margin-top: 10px; }
  .list-item { 
    padding: 15px 20px; 
    border-bottom: 2px solid #eee; 
    display: flex; 
    align-items: center; 
    justify-content: space-between;
  }
  /* 名前のサイズを維持しつつ1行に */
  .item-info { 
    font-size: 50px; 
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .paid { background: #d4edda; }
  
  /* 操作ボタンを横に配置 */
  .item-btn { width: auto !important; min-width: 150px; padding: 10px 20px !important; margin: 0 !important; font-size: 32px !important; }

  /* ダイアログ */
  #dialogOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; }
  #dialogBox { width: 90%; padding: 30px; border-radius: 20px; background: #fff; text-align: center; }
</style>
</head>

<body>

<!-- 上部固定：カメラと合計金額 -->
<div id="scannerContainer">
  <div style="background: #333; color: white; padding: 10px; border-radius: 10px; text-align: center; font-weight: bold; margin-bottom: 5px;">
    合計: <span id="totalAmount">0</span>円
  </div>
  <div id="reader"></div>
  <div class="row-group">
    <button onclick="startScanner()">スキャン開始</button>
    <button class="btn-stop" onclick="stopScanner()">停止</button>
  </div>
</div>

<div id="mainContent">
  <div id="setupArea" style="display: flex; gap: 10px;">
    <input type="file" id="file" accept=".xlsx" style="font-size: 20px;">
    <button class="btn-reset" onclick="confirmReset()" style="width: 200px; font-size: 24px; background: #6c757d;">消去</button>
  </div>

  <div id="searchArea">
    <input type="text" id="kanaSearch" placeholder="名前検索" oninput="updateList()">
    <div class="row-group">
      <select id="groupSearch" onchange="updateList()"><option value="">全組</option></select>
      <select id="statusSearch" onchange="updateList()">
        <option value="all">全員</option>
        <option value="unpaid">未納</option>
        <option value="paid">完済</option>
      </select>
    </div>
    <div id="candidateList"></div>
  </div>

  <div class="row-group" style="margin-top: 20px;">
    <button class="btn-excel" onclick="exportLogs()">ログ出力</button>
    <button class="btn-excel" onclick="exportRoster()">名簿出力</button>
  </div>
</div>

<!-- 確認ダイアログ -->
<div id="dialogOverlay">
  <div id="dialogBox">
    <div id="dialogMessage" style="font-size: 40px; margin-bottom: 30px; white-space: pre-wrap; font-weight: bold;"></div>
    <div class="row-group">
      <button onclick="dialogClick(false)" style="background:#ccc; color:black;">いいえ</button>
      <button onclick="dialogClick(true)">はい</button>
    </div>
  </div>
</div>

<script>
let roster = [];
let html5QrCode = null;
let dialogResolver = null;
let isProcessing = false; // 二重読み取り防止

window.onload = () => {
  const saved = localStorage.getItem('paymentRoster');
  if (saved) {
    roster = JSON.parse(saved);
    rebuildGroupOptions();
    updateList();
  }
};

document.getElementById('file').addEventListener('change', (e) => {
  const reader = new FileReader();
  reader.onload = (e) => {
    const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
    roster = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
    rebuildGroupOptions();
    saveAndRefresh();
  };
  reader.readAsArrayBuffer(e.target.files[0]);
});

function rebuildGroupOptions() {
  const groupSelect = document.getElementById('groupSearch');
  const groups = [...new Set(roster.map(r => r["組"]).filter(Boolean))];
  groupSelect.innerHTML = '<option value="">全組</option>';
  groups.sort().forEach(g => {
    const opt = document.createElement('option');
    opt.value = g; opt.textContent = g + "組";
    groupSelect.appendChild(opt);
  });
}

function saveAndRefresh() {
  localStorage.setItem('paymentRoster', JSON.stringify(roster));
  updateList();
}

function updateList() {
  const search = document.getElementById('kanaSearch').value;
  const groupFilter = document.getElementById('groupSearch').value;
  const statusFilter = document.getElementById('statusSearch').value;
  const container = document.getElementById('candidateList');
  container.innerHTML = "";
  let total = 0;

  roster.forEach(p => {
    const isPaid = p["支払いステータス"] === "完了";
    if (isPaid) total += Number(p["金額"] || 0);

    const matchSearch = !search || (p["氏名"]+(p["ふりがな"]||"")).includes(search);
    const matchGroup = !groupFilter || String(p["組"]) === groupFilter;
    const matchStatus = statusFilter === "all" || (statusFilter === "paid" ? isPaid : !isPaid);

    if (matchSearch && matchGroup && matchStatus) {
      const div = document.createElement('div');
      div.className = 'list-item' + (isPaid ? " paid" : "");
      div.innerHTML = `
        <div class="item-info">${p["組"] ? p["組"]+'-' : ''}${p["氏名"]}</div>
        <button class="item-btn" onclick="confirmPay('${p["ID"]}', 'manual')">${isPaid ? '取消' : '支払'}</button>
      `;
      container.appendChild(div);
    }
  });
  document.getElementById('totalAmount').innerText = total.toLocaleString();
}

function showDialog(msg) {
  document.getElementById('dialogMessage').innerText = msg;
  document.getElementById('dialogOverlay').style.display = 'flex';
  return new Promise(res => { dialogResolver = res; });
}
function dialogClick(val) {
  document.getElementById('dialogOverlay').style.display = 'none';
  dialogResolver(val);
}

async function confirmPay(id, type) {
  const p = roster.find(r => String(r["ID"]) === String(id));
  const isCurrentlyPaid = p["支払いステータス"] === "完了";
  const actionText = isCurrentlyPaid ? "取り消し" : "支払い";

  if (await showDialog(`${p["氏名"]}さん\n${actionText}を確定？`)) {
    if (!isCurrentlyPaid) {
      p["支払いステータス"] = "完了";
      p["入力区分"] = type === "manual" ? "手動" : "カメラ";
      const now = new Date();
      p["日付"] = now.toLocaleDateString();
      p["時刻"] = now.toTimeString().split(' ')[0];
    } else {
      p["支払いステータス"] = "";
      delete p["入力区分"]; delete p["日付"]; delete p["時刻"];
    }
    saveAndRefresh();
  }
}

async function confirmReset() {
  if (await showDialog("全消去しますか？")) {
    localStorage.clear(); roster = []; saveAndRefresh();
  }
}

async function startScanner() {
  if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
  const config = { fps: 15, qrbox: { width: 250, height: 120 } };
  try {
    await html5QrCode.start({ facingMode: "environment" }, config, async (decodedText) => {
      if (isProcessing) return;
      isProcessing = true;
      const p = roster.find(r => String(r["ID"]) === String(decodedText));
      if (p) {
        await confirmPay(p["ID"], "barcode");
      } else {
        await showDialog(`未登録: ${decodedText}`);
      }
      isProcessing = false;
    });
  } catch (err) { alert("カメラエラー: " + err); }
}

async function stopScanner() {
  if (html5QrCode) { try { await html5QrCode.stop(); } catch(e) {} }
}

function exportRoster() {
  const ws = XLSX.utils.json_to_sheet(roster);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "名簿");
  XLSX.writeFile(wb, "roster.xlsx");
}
function exportLogs() {
  const logs = roster.filter(r => r["支払いステータス"] === "完了");
  const ws = XLSX.utils.json_to_sheet(logs);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "ログ");
  XLSX.writeFile(wb, "logs.xlsx");
}
</script>
</body>
</html>
