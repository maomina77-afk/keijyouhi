<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Camera Test - Minimal</title>
  <style>
    video { width: 100%; max-width: 640px; background: #000; }
    #start { margin-top: 8px; padding: 8px 12px; }
  </style>
</head>
<body>
  <h3>カメラテスト</h3>
  <video id="video" playsinline autoplay muted></video>
  <br />
  <button id="start">Start カメラ開始 / 停止</button>

  <script>
    const startBtn = document.getElementById('start');
    const videoEl = document.getElementById('video');
    let stream = null;

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });
        videoEl.srcObject = stream;
        await videoEl.play();
        console.log('カメラ起動成功');
        startBtn.textContent = 'Stop カメラ停止';
      } catch (err) {
        console.error('カメラ起動エラー:', err);
        alert('カメラを起動できませんでした: ' + (err.message || err.name));
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      videoEl.srcObject = null;
      startBtn.textContent = 'Start カメラ開始 / 停止';
    }

    startBtn.addEventListener('click', async () => {
      if (stream) {
        stopCamera();
      } else {
        await startCamera();
      }
    });

    window.addEventListener('beforeunload', stopCamera);
  </script>
</body>
</html>
