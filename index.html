<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>支払い確認アプリ (完成版ロジック搭載)</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
<style>
  /* --- 前回の使いやすいデザインを完全再現 --- */
  * { box-sizing: border-box; }
  body { font-family: sans-serif; font-size: 32px; padding: 12px; margin: 0; background: #f5f5f5; }
  input, select, button { font-size: 32px; padding: 18px; width: 100%; margin-top: 12px; border-radius: 12px; border: 2px solid #ccc; }
  button { background: #007bff; color: #fff; border: none; cursor: pointer; }
  
  #topInfo { position: sticky; top: 0; background: #ffffff; padding: 15px; border-bottom: 4px solid #ccc; z-index: 20; display: flex; justify-content: space-between; align-items: center; }
  
  #reader { width: 100%; max-width: 520px; margin: 16px auto; background: #000; position: relative; border-radius: 12px; overflow: hidden; }
  #reader video, #reader canvas { width: 100%; height: auto; }
  canvas.drawingBuffer { position: absolute; left: 0; top: 0; }

  #candidateList { border: 3px solid #ccc; border-radius: 12px; max-height: 500px; overflow-y: auto; margin-top: 10px; background: #fff; }
  .list-item { padding: 25px; border-bottom: 2px solid #eee; display: flex; justify-content: space-between; align-items: center; gap: 15px; }
  
  /* 名前を大きく表示 */
  .item-name { font-size: 64px; font-weight: bold; flex: 1; word-break: break-all; line-height: 1.1; }
  .paid { background: #e0ffe0; }

  /* ダイアログ */
  #dialogOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 100; }
  #dialogBox { width: 85%; padding: 30px; border-radius: 20px; text-align: center; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

  .row-group { display: flex; gap: 10px; margin-top: 12px; }
  .row-group > * { flex: 1; margin-top: 0; }
  .btn-stop { background: #dc3545; }
  .btn-excel { background: #28a745; }
  .btn-reset { background: #6c757d; font-size: 24px; padding: 10px; margin-top: 20px; }
</style>
</head>

<body>
<div id="topInfo">
  <div>合計: <span id="totalAmount">0</span> 円</div>
  <div style="font-size: 24px;">最終: <span id="lastUpdate">-</span></div>
</div>

<div id="searchArea">
  <div style="font-size:24px; margin-top:10px;">名簿ファイル（.xlsx）を選択：</div>
  <input type="file" id="file" accept=".xlsx">
  
  <h3>検索・絞り込み</h3>
  <input type="text" id="kanaSearch" placeholder="ふりがな検索" oninput="updateList()">
  
  <div class="row-group">
    <select id="groupSearch" onchange="updateList()"><option value="">全組</option></select>
    <select id="statusSearch" onchange="updateList()">
      <option value="all">全員</option>
      <option value="unpaid">未納</option>
      <option value="paid">既払</option>
    </select>
  </div>
  
  <div id="candidateList"></div>
</div>

<h3>カメラスキャン</h3>
<div class="row-group">
  <button id="startBtn" onclick="startScanner()">カメラ起動</button>
  <button class="btn-stop" id="stopBtn" onclick="stopScanner()">停止</button>
</div>
<div id="reader"></div>
<p id="scanResult" style="font-size: 24px; text-align: center;"></p>

<div class="row-group" style="margin-top: 30px;">
  <button class="btn-excel" onclick="exportLogs()">ログ出力</button>
  <button class="btn-excel" onclick="exportRoster()">名簿出力</button>
</div>

<button class="btn-reset" onclick="confirmReset()">データをリセット</button>

<!-- ダイアログ -->
<div id="dialogOverlay">
  <div id="dialogBox">
    <div id="dialogMessage" style="font-size: 40px; margin-bottom: 30px; white-space: pre-wrap;"></div>
    <div class="row-group">
      <button id="dialogCancel" style="background:#ccc; color:#000;">いいえ</button>
      <button id="dialogOk">はい</button>
    </div>
  </div>
</div>

<script>
let roster = [];
let isScanning = false;
let dialogResolver = null;

// 起動時に保存データを読み込み（更新対策）
window.onload = () => {
  const saved = localStorage.getItem('paymentRoster');
  if (saved) {
    roster = JSON.parse(saved);
    rebuildGroupOptions();
    updateList();
  }
};

// Excel読み込み
document.getElementById('file').addEventListener('change', (e) => {
  const reader = new FileReader();
  reader.onload = (e) => {
    const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
    roster = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
    rebuildGroupOptions();
    saveAndRefresh();
    alert(roster.length + " 件読み込みました。");
  };
  reader.readAsArrayBuffer(e.target.files[0]);
});

function rebuildGroupOptions() {
  const groupSelect = document.getElementById('groupSearch');
  const groups = [...new Set(roster.map(r => r["組"]).filter(Boolean))];
  groupSelect.innerHTML = '<option value="">全組</option>';
  groups.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g; opt.textContent = g + "組";
    groupSelect.appendChild(opt);
  });
}

function saveAndRefresh() {
  localStorage.setItem('paymentRoster', JSON.stringify(roster));
  updateList();
}

function updateList() {
  const search = document.getElementById('kanaSearch').value;
  const groupFilter = document.getElementById('groupSearch').value;
  const statusFilter = document.getElementById('statusSearch').value;
  const container = document.getElementById('candidateList');
  container.innerHTML = "";
  let total = 0;

  roster.forEach(p => {
    const isPaid = p["支払いステータス"] === "完了";
    if (isPaid) total += Number(p["金額"] || 0);

    const matchSearch = !search || (p["氏名"]+(p["ふりがな"]||"")).includes(search);
    const matchGroup = !groupFilter || String(p["組"]) === groupFilter;
    const matchStatus = statusFilter === "all" || (statusFilter === "paid" ? isPaid : !isPaid);

    if (matchSearch && matchGroup && matchStatus) {
      const div = document.createElement('div');
      div.className = 'list-item' + (isPaid ? " paid" : "");
      div.innerHTML = `
        <div class="item-name">${p["氏名"]}</div>
        <button onclick="confirmPay('${p["ID"]}', 'manual')" style="width:auto; padding:15px 30px;">${isPaid ? '取消' : '支払'}</button>
      `;
      container.appendChild(div);
    }
  });
  document.getElementById('totalAmount').innerText = total.toLocaleString();
}

// カスタムダイアログ
function showDialog(msg, color="#fff") {
  document.getElementById('dialogMessage').innerText = msg;
  const overlay = document.getElementById('dialogOverlay');
  overlay.style.display = 'flex';
  return new Promise(res => {
    document.getElementById('dialogOk').onclick = () => { overlay.style.display='none'; res(true); };
    document.getElementById('dialogCancel').onclick = () => { overlay.style.display='none'; res(false); };
  });
}

// 支払い処理 (ログ機能付き)
async function confirmPay(id, type) {
  const p = roster.find(r => String(r["ID"]) === String(id));
  const isCurrentlyPaid = p["支払いステータス"] === "完了";
  const actionText = isCurrentlyPaid ? "取り消し" : "支払い";
  const typeText = type === "manual" ? "手動入力" : "バーコード入力";

  if (await showDialog(`${p["氏名"]}さん\n${actionText}を確定しますか？\n(${typeText})`)) {
    if (!isCurrentlyPaid) {
      p["支払いステータス"] = "完了";
      p["入力区分"] = typeText;
      const now = new Date();
      p["日付"] = now.toLocaleDateString();
      p["時刻"] = now.getHours().toString().padStart(2, '0') + ":" + 
                 now.getMinutes().toString().padStart(2, '0') + ":" + 
                 now.getSeconds().toString().padStart(2, '0');
    } else {
      p["支払いステータス"] = "";
      delete p["入力区分"]; delete p["日付"]; delete p["時刻"];
    }
    document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString();
    saveAndRefresh();
  }
}

async function confirmReset() {
  if (await showDialog("保存データを全て消去しますか？")) {
    localStorage.clear(); roster = []; saveAndRefresh();
  }
}

// カメラ処理
function startScanner() {
  Quagga.init({
    inputStream: { type: "LiveStream", target: document.querySelector('#reader'), constraints: { facingMode: "environment" } },
    decoder: { readers: ["code_128_reader", "ean_reader", "code_39_reader"] }
  }, (err) => { if(!err) { Quagga.start(); isScanning = true; } });
}
function stopScanner() { Quagga.stop(); isScanning = false; }

Quagga.onDetected(async (data) => {
  const code = data.codeResult.code;
  Quagga.pause();
  const p = roster.find(r => String(r["ID"]) === String(code));
  if (p) {
    await confirmPay(p["ID"], "barcode");
  } else {
    await showDialog(`未登録データです\n読取値: ${code}`);
  }
  if(isScanning) Quagga.resume();
});

// Excel出力
function exportRoster() {
  const ws = XLSX.utils.json_to_sheet(roster);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "全名簿");
  XLSX.writeFile(wb, "updated_roster.xlsx");
}
function exportLogs() {
  const logs = roster.filter(r => r["支払いステータス"] === "完了");
  const ws = XLSX.utils.json_to_sheet(logs);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "支払いログ");
  XLSX.writeFile(wb, "payment_logs.xlsx");
}
</script>
</body>
</html>
