<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>支払い管理システム 6.0 (最適化版)</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
  /* 全体デザイン */
  body { font-family: sans-serif; font-size: 48px; padding: 20px; margin: 0; background: #f0f0f0; }
  h3 { font-size: 54px; margin: 20px 0; border-left: 10px solid #007bff; padding-left: 20px; }
  input, select, button { font-size: 48px; padding: 25px; width: 100%; margin-top: 15px; border-radius: 15px; border: 2px solid #ccc; }
  
  .row-group { display: flex; gap: 15px; margin-top: 15px; }
  .row-group > * { flex: 1; margin-top: 0; }

  button { background: #007bff; color: white; cursor: pointer; border: none; }
  .btn-stop { background: #dc3545; }
  .btn-reset { background: #6c757d; }
  .btn-excel { background: #28a745; }

  /* スキャナー表示エリア（高さを半分程度に調整） */
  #reader { width: 100%; max-width: 800px; margin: 20px auto; background: #000; border-radius: 20px; overflow: hidden; min-height: 250px; }
  
  /* リスト表示 */
  #candidateList { border: 4px solid #333; border-radius: 20px; max-height: 800px; overflow-y: auto; background: #fff; margin-top: 20px; }
  .list-item { 
    padding: 30px 25px; 
    border-bottom: 3px solid #eee; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    gap: 20px;
  }
  /* 名前のサイズを前回の4分の3 (60px) に調整 */
  .item-name { 
    font-size: 60px; 
    font-weight: bold;
    flex: 1;
    word-break: break-all;
    line-height: 1.2;
  }
  .paid { background: #d4edda; }
  
  /* ダイアログ */
  #dialogOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; }
  #dialogBox { width: 90%; padding: 40px; border-radius: 30px; background: #fff; text-align: center; }
</style>
</head>

<body>

<div id="topInfo" style="background: #333; color: white; padding: 20px; border-radius: 20px; text-align: center; font-weight: bold;">
  合計: <span id="totalAmount">0</span>円
</div>

<div id="setupArea">
  <input type="file" id="file" accept=".xlsx">
  <button class="btn-reset" onclick="confirmReset()">全データ消去リセット</button>
</div>

<div id="searchArea">
  <h3>名簿検索</h3>
  <input type="text" id="kanaSearch" placeholder="名前・ふりがな検索" oninput="updateList()">
  
  <div class="row-group">
    <select id="groupSearch" onchange="updateList()"><option value="">全組</option></select>
    <select id="statusSearch" onchange="updateList()">
      <option value="all">全員</option>
      <option value="unpaid">未納</option>
      <option value="paid">支払い済</option>
    </select>
  </div>
  
  <div id="candidateList"></div>
</div>

<h3>スキャン</h3>
<div class="row-group">
  <button id="startBtn" onclick="startScanner()">カメラ起動</button>
  <button class="btn-stop" id="stopBtn" onclick="stopScanner()">停止</button>
</div>
<div id="reader"></div>

<div class="row-group" style="margin-top: 40px;">
  <button class="btn-excel" onclick="exportLogs()">ログ出力</button>
  <button class="btn-excel" onclick="exportRoster()">名簿出力</button>
</div>

<div id="dialogOverlay">
  <div id="dialogBox">
    <div id="dialogMessage" style="font-size: 50px; margin-bottom: 40px; white-space: pre-wrap; font-weight: bold;"></div>
    <div class="row-group">
      <button onclick="dialogClick(false)" style="background:#ccc; color:black;">いいえ</button>
      <button onclick="dialogClick(true)">はい</button>
    </div>
  </div>
</div>

<script>
let roster = [];
let html5QrCode = null;
let dialogResolver = null;

window.onload = () => {
  const saved = localStorage.getItem('paymentRoster');
  if (saved) {
    roster = JSON.parse(saved);
    rebuildGroupOptions();
    updateList();
  }
};

document.getElementById('file').addEventListener('change', (e) => {
  const reader = new FileReader();
  reader.onload = (e) => {
    const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
    roster = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
    rebuildGroupOptions();
    saveAndRefresh();
    alert("名簿を読み込みました");
  };
  reader.readAsArrayBuffer(e.target.files[0]);
});

function rebuildGroupOptions() {
  const groupSelect = document.getElementById('groupSearch');
  const groups = [...new Set(roster.map(r => r["組"]).filter(Boolean))];
  groupSelect.innerHTML = '<option value="">全組</option>';
  groups.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g; opt.textContent = g + "組";
    groupSelect.appendChild(opt);
  });
}

function saveAndRefresh() {
  localStorage.setItem('paymentRoster', JSON.stringify(roster));
  updateList();
}

function updateList() {
  const search = document.getElementById('kanaSearch').value;
  const groupFilter = document.getElementById('groupSearch').value;
  const statusFilter = document.getElementById('statusSearch').value;
  const container = document.getElementById('candidateList');
  container.innerHTML = "";
  let total = 0;

  roster.forEach(p => {
    const isPaid = p["支払いステータス"] === "完了";
    if (isPaid) total += Number(p["金額"] || 0);

    const matchSearch = !search || (p["氏名"]+(p["ふりがな"]||"")).includes(search);
    const matchGroup = !groupFilter || String(p["組"]) === groupFilter;
    const matchStatus = statusFilter === "all" || (statusFilter === "paid" ? isPaid : !isPaid);

    if (matchSearch && matchGroup && matchStatus) {
      const div = document.createElement('div');
      div.className = 'list-item' + (isPaid ? " paid" : "");
      div.innerHTML = `
        <div class="item-name">${p["組"] ? p["組"]+'組 ' : ''}${p["氏名"]}</div>
        <button onclick="confirmPay('${p["ID"]}', 'manual')" style="width:auto; padding:25px 40px; min-width: 180px; font-size: 40px;">${isPaid ? '取消' : '支払'}</button>
      `;
      container.appendChild(div);
    }
  });
  document.getElementById('totalAmount').innerText = total.toLocaleString();
}

function showDialog(msg) {
  document.getElementById('dialogMessage').innerText = msg;
  document.getElementById('dialogOverlay').style.display = 'flex';
  return new Promise(res => { dialogResolver = res; });
}
function dialogClick(val) {
  document.getElementById('dialogOverlay').style.display = 'none';
  dialogResolver(val);
}

async function confirmPay(id, type) {
  const p = roster.find(r => String(r["ID"]) === String(id));
  const isCurrentlyPaid = p["支払いステータス"] === "完了";
  const actionText = isCurrentlyPaid ? "取り消し" : "支払い";
  const typeText = type === "manual" ? "手動入力" : "バーコード入力";

  if (await showDialog(`${p["氏名"]}さん\n${actionText}を確定しますか？\n(${typeText})`)) {
    if (!isCurrentlyPaid) {
      p["支払いステータス"] = "完了";
      p["入力区分"] = typeText;
      const now = new Date();
      p["日付"] = now.toLocaleDateString();
      p["時刻"] = now.getHours().toString().padStart(2, '0') + ":" + 
                 now.getMinutes().toString().padStart(2, '0') + ":" + 
                 now.getSeconds().toString().padStart(2, '0');
    } else {
      p["支払いステータス"] = "";
      delete p["入力区分"];
      delete p["日付"];
      delete p["時刻"];
    }
    saveAndRefresh();
  }
}

async function confirmReset() {
  if (await showDialog("全てのデータを消去して初期化しますか？")) {
    localStorage.clear(); roster = []; saveAndRefresh();
  }
}

async function startScanner() {
  if (!html5QrCode) {
    html5QrCode = new Html5Qrcode("reader");
  }
  // カメラの読み取り枠のサイズを調整（高さ250px程度に合わせて）
  const config = { fps: 10, qrbox: { width: 400, height: 180 } };
  
  try {
    await html5QrCode.start(
      { facingMode: "environment" }, 
      config, 
      async (decodedText) => {
        await onScanSuccess(decodedText);
      }
    );
  } catch (err) {
    alert("カメラ起動エラー: " + err);
  }
}

async function stopScanner() {
  if (html5QrCode) {
    try { await html5QrCode.stop(); } catch(e) {}
  }
}

async function onScanSuccess(code) {
  const p = roster.find(r => String(r["ID"]) === String(code));
  if (p) {
    await stopScanner();
    await confirmPay(p["ID"], "barcode");
    startScanner(); 
  } else {
    await stopScanner();
    await showDialog(`未登録IDです\n読取値: ${code}`);
    startScanner();
  }
}

function exportRoster() {
  const ws = XLSX.utils.json_to_sheet(roster);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "全名簿");
  XLSX.writeFile(wb, "full_roster.xlsx");
}
function exportLogs() {
  const logs = roster.filter(r => r["支払いステータス"] === "完了");
  const ws = XLSX.utils.json_to_sheet(logs);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "支払いログ");
  XLSX.writeFile(wb, "payment_logs.xlsx");
}
</script>
</body>
</html>
