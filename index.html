<!doctype html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body>
  <h3>getUserMedia テスト</h3>
  <button id="start">カメラ起動</button>
  <button id="stop" disabled>停止</button>
  <div id="status">未開始</div>
  <video id="v" autoplay playsinline style="width:100%;max-width:480px;background:#000"></video>
  <pre id="log" style="white-space:pre-wrap;background:#eee;padding:8px"></pre>
<script>
const start = document.getElementById('start'), stop = document.getElementById('stop');
const v = document.getElementById('v'), status = document.getElementById('status'), logEl = document.getElementById('log');
let stream = null;
function log(s){ logEl.textContent += s + "\n"; console.log(s); }
start.addEventListener('click', async () => {
  try {
    status.textContent = '取得中...';
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal:1280 } } });
    v.srcObject = stream;
    status.textContent = '取得成功: ' + (stream.getVideoTracks()[0].label || 'unknown');
    log('track: ' + JSON.stringify(stream.getVideoTracks()[0].getSettings()));
    start.disabled = true; stop.disabled = false;
  } catch (e) {
    status.textContent = '取得失敗';
    log('エラー: ' + e.name + ' - ' + e.message);
  }
});
stop.addEventListener('click', () => {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
    v.srcObject = null;
    status.textContent = '停止';
    start.disabled = false; stop.disabled = true;
  }
});
</script>
</body>
</html>
